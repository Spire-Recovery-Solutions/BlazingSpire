<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BlazingSpire is a Blazor component framework inspired by shadcn/ui. Copy-paste components, Tailwind CSS v4, OKLCH color system. You own the code." />
    <base href="/" />
    <link rel="stylesheet" href="app.build.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>BlazingSpire</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body class="min-h-screen bg-background text-foreground antialiased">
    <div id="app">
        <!-- Pre-rendered skeleton so LCP fires on static content -->
        <div class="min-h-screen" style="background:oklch(0.97 0 0)">
            <header style="position:sticky;top:0;z-index:50;width:100%;border-bottom:1px solid oklch(0.90 0 0);background:oklch(0.97 0 0)">
                <div style="max-width:80rem;margin:0 auto;display:flex;height:3.5rem;align-items:center;padding:0 1rem">
                    <div style="display:flex;align-items:center;gap:0.5rem;font-weight:600;color:oklch(0.25 0 0)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="oklch(0.47 0.18 25)"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="height:1.25rem;width:1.25rem">
                            <path d="m13 2 7 7-7 7" /><path d="m6 9 4 4-4 4" />
                        </svg>
                        <span>BlazingSpire</span>
                    </div>
                </div>
            </header>
            <main style="max-width:80rem;margin:0 auto;padding:2rem 1rem">
                <div style="margin-bottom:1rem">
                    <h1 style="font-size:2.25rem;font-weight:700;letter-spacing:-0.025em;color:oklch(0.25 0 0)">BlazingSpire</h1>
                    <p style="font-size:1.125rem;color:oklch(0.45 0 0);max-width:42rem;margin-top:1rem">
                        A Blazor component framework inspired by shadcn/ui. Copy-paste components,
                        Tailwind CSS v4, OKLCH color system. You own the code.
                    </p>
                </div>
            </main>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x2717;</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
