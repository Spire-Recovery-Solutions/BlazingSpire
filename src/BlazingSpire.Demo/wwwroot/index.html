<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BlazingSpire is a Blazor component framework inspired by shadcn/ui. Copy-paste components, Tailwind CSS v4, OKLCH color system. You own the code." />
    <base href="/" />
    <link rel="preload" href="app.build.css" as="style" />
    <link rel="stylesheet" href="app.build.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>BlazingSpire</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/prism-blazingspire.css" />
    <script src="js/prism-custom.js" data-manual></script>
    <script>
        window.BlazingSpire = {
            setTextAndHighlight: function(element, text) {
                element.textContent = text;
                Prism.highlightElement(element);
            }
        };
    </script>
</head>

<body class="min-h-screen bg-background text-foreground antialiased">
    <!-- Skeleton OUTSIDE #app — Blazor cannot replace it, so it stays as LCP -->
    <div id="skeleton">
        <div style="position:fixed;top:0;left:0;height:3px;z-index:9999;background:oklch(0.42 0.18 25);width:calc(var(--blazor-load-percentage, 0) * 1%);transition:width 0.3s ease"></div>
        <div style="min-height:100vh" class="bg-background">
            <div style="position:sticky;top:0;z-index:50;width:100%;border-bottom:1px solid var(--color-border)" class="bg-background">
                <nav aria-label="Main navigation" style="max-width:80rem;margin:0 auto;display:flex;height:3.5rem;align-items:center;padding:0 1rem">
                    <a href="/" style="display:flex;align-items:center;gap:0.5rem;font-weight:600;text-decoration:none" class="text-foreground">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="height:1.25rem;width:1.25rem" class="text-primary" aria-hidden="true">
                            <path d="m13 2 7 7-7 7" /><path d="m6 9 4 4-4 4" />
                        </svg>
                        <span>BlazingSpire</span>
                    </a>
                </nav>
            </div>
            <main style="max-width:80rem;margin:0 auto;padding:2rem 1rem">
                <h1 class="text-4xl font-bold tracking-tight">BlazingSpire</h1>
                <p class="text-lg text-muted-foreground max-w-2xl" style="margin-top:1rem">
                    A Blazor component framework inspired by shadcn/ui. Copy-paste components,
                    Tailwind CSS v4, OKLCH color system. You own the code.
                </p>
            </main>
        </div>
    </div>

    <!-- Blazor renders here, hidden until ready -->
    <div id="app" style="display:none"></div>

    <div id="blazor-error-ui" data-nosnippet style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:1000;padding:0.6rem 1.25rem;background:#b32121;color:#fff;text-align:center;font-size:0.9rem">
        An unhandled error has occurred.
        <a href="." class="reload" style="color:#fff;margin-left:0.5rem">Reload</a>
        <span class="dismiss" style="cursor:pointer;margin-left:1rem">&#x2717;</span>
    </div>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        Blazor.start().then(function () {
            document.getElementById('skeleton').remove();
            document.getElementById('app').style.display = '';
        });
    </script>
</body>

</html>
