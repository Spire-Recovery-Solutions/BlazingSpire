name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/BlazingSpire.Demo/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup dotnet PATH
        run: echo "$HOME/.dotnet" >> $GITHUB_PATH

      - name: Install Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npx @tailwindcss/cli -i wwwroot/app.css -o wwwroot/app.build.css --minify

      - name: Publish Blazor WASM
        run: dotnet publish src/BlazingSpire.Demo -c Release -o publish

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish/wwwroot --project-name=blazingspire
