name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    # Anything that can change the published WASM output must retrigger the deploy.
    # Previously only src/BlazingSpire.Demo/** did — meaning source-generator fixes
    # silently skipped deployment while still affecting the emitted playground code.
    paths:
      - 'src/BlazingSpire.Demo/**'
      - 'src/BlazingSpire.SourceGenerator/**'
      - 'tools/BlazingSpire.DocGen/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npx @tailwindcss/cli -i wwwroot/app.css -o wwwroot/app.build.css --minify

      - name: Pre-highlight code blocks
        working-directory: src/BlazingSpire.Demo
        run: node highlight-code.js

      - name: Publish Blazor WASM
        run: dotnet publish src/BlazingSpire.Demo -c Release -o publish

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish/wwwroot --project-name=blazingspire --commit-dirty=true
