name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: src/BlazingSpire.Demo
        run: npx @tailwindcss/cli -i wwwroot/app.css -o wwwroot/app.build.css --minify

      - name: Build solution
        run: dotnet build

      - name: Run unit tests
        run: dotnet test test/BlazingSpire.Tests.Unit --no-build --logger "trx;LogFileName=unit-results.trx"

      - name: Install Playwright browsers
        run: pwsh test/BlazingSpire.Tests.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: dotnet test test/BlazingSpire.Tests.E2E --no-build --logger "trx;LogFileName=e2e-results.trx"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test/BlazingSpire.Tests.Unit/TestResults/
            test/BlazingSpire.Tests.E2E/TestResults/
          retention-days: 7
